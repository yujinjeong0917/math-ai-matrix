<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>개념 증명 · 수학 × AI 매트릭스</title>
<meta name="description" content="수학 × AI 매트릭스의 각 개념을 완전한 증명과 빈칸 문제로 파고드는 상세 페이지." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧮</text></svg>" />

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<script>
  (function () {
    var saved = localStorage.getItem("theme");
    if (saved === "dark" || saved === "light") {
      document.documentElement.setAttribute("data-theme", saved);
    }
  })();
</script>

<style>
  :root {
    --paper: #eef0f3; --surface: #fbfbfc; --surface-2: #ffffff;
    --ink: #1a2130; --ink-dim: #566072; --ink-faint: #8a92a3;
    --line: #d7dbe2; --line-soft: #e4e7ec;
    --highlight: #d98c14; --highlight-bg: #fbe9cd;

    --c-linalg: #33569e; --c-calc: #b85c26; --c-prob: #1c7f68;
    --c-info: #7d3d92; --c-disc: #93701f; --c-numeric: #a13b52;
    --c-linalg-bg: #e9edf7; --c-calc-bg: #f6e8dd; --c-prob-bg: #e1f0ea;
    --c-info-bg: #efe1f3; --c-disc-bg: #f2ead9; --c-numeric-bg: #f5e3e7;

    --font-kr: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #12151b; --surface: #171b23; --surface-2: #1d222c;
      --ink: #e8eaef; --ink-dim: #a3aab8; --ink-faint: #6b7383;
      --line: #2c3240; --line-soft: #232834;
      --highlight: #eab35a; --highlight-bg: #3a2c14;
      --c-linalg: #7d9be4; --c-calc: #e3966a; --c-prob: #5cc7a6;
      --c-info: #cb8fdd; --c-disc: #d3b25c; --c-numeric: #db8fa0;
      --c-linalg-bg: #1c2333; --c-calc-bg: #2b2119; --c-prob-bg: #162a24;
      --c-info-bg: #291f2e; --c-disc-bg: #2a2216; --c-numeric-bg: #3a2028;
    }
  }
  :root[data-theme="dark"] {
    --paper: #12151b; --surface: #171b23; --surface-2: #1d222c;
    --ink: #e8eaef; --ink-dim: #a3aab8; --ink-faint: #6b7383;
    --line: #2c3240; --line-soft: #232834;
    --highlight: #eab35a; --highlight-bg: #3a2c14;
    --c-linalg: #7d9be4; --c-calc: #e3966a; --c-prob: #5cc7a6;
    --c-info: #cb8fdd; --c-disc: #d3b25c; --c-numeric: #db8fa0;
    --c-linalg-bg: #1c2333; --c-calc-bg: #2b2119; --c-prob-bg: #162a24;
    --c-info-bg: #291f2e; --c-disc-bg: #2a2216; --c-numeric-bg: #3a2028;
  }
  :root[data-theme="light"] {
    --paper: #eef0f3; --surface: #fbfbfc; --surface-2: #ffffff;
    --ink: #1a2130; --ink-dim: #566072; --ink-faint: #8a92a3;
    --line: #d7dbe2; --line-soft: #e4e7ec;
    --highlight: #d98c14; --highlight-bg: #fbe9cd;
    --c-linalg: #33569e; --c-calc: #b85c26; --c-prob: #1c7f68;
    --c-info: #7d3d92; --c-disc: #93701f; --c-numeric: #a13b52;
    --c-linalg-bg: #e9edf7; --c-calc-bg: #f6e8dd; --c-prob-bg: #e1f0ea;
    --c-info-bg: #efe1f3; --c-disc-bg: #f2ead9; --c-numeric-bg: #f5e3e7;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--font-kr); line-height: 1.65; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 24px 80px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; gap: 12px; }
  .back-link {
    font-family: var(--font-mono); font-size: 12.5px; color: var(--ink-dim);
    text-decoration: none; display: flex; align-items: center; gap: 6px;
  }
  .back-link:hover { color: var(--ink); }

  .theme-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line-soft);
    font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); cursor: pointer;
  }
  .theme-toggle:hover { border-color: var(--ink-faint); }
  .theme-toggle .dot-bw {
    width: 12px; height: 12px; border-radius: 50%; flex: none;
    background: linear-gradient(135deg, #fff 50%, #14151a 50%); border: 1px solid var(--line);
  }

  .domain-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px; margin-bottom: 14px;
  }
  .domain-tag .dot { width: 8px; height: 8px; border-radius: 50%; }

  h1 { font-size: clamp(24px, 3.6vw, 34px); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 18px; text-wrap: balance; }

  .explanation {
    background: var(--surface); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 22px 24px; margin-bottom: 28px; color: var(--ink-dim); font-size: 15px;
    line-height: 1.85; max-width: 66ch;
  }
  .explanation strong { color: var(--ink); }

  .proof-heading {
    font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-faint); margin: 32px 0 12px;
  }
  .part-heading {
    font-size: 14.5px; font-weight: 800; color: var(--ink);
    margin: 28px 0 10px; padding-top: 18px; border-top: 1px solid var(--line-soft);
  }
  .part-heading:first-child { border-top: none; padding-top: 0; }

  .proof-grid { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: start; }
  @media (min-width: 900px) {
    .proof-grid { grid-template-columns: 1fr 360px; gap: 28px; }
    .proof-explain { position: sticky; top: 20px; max-height: calc(100vh - 40px); overflow-y: auto; }
  }

  .proof-left { display: flex; flex-direction: column; gap: 16px; max-width: 68ch; }
  .proof-row {
    background: var(--surface); border: 1px solid var(--line-soft); border-radius: 12px;
    padding: 18px 20px;
  }
  .proof-row.is-revealed { border-color: var(--highlight); }
  .proof-text { margin: 0 0 12px; font-size: 15px; line-height: 1.9; }
  .proof-text .katex { font-size: 1.04em; }
  .proof-text .katex-display { margin: 10px 0; }

  .blank {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.4em; padding: 1px 8px; margin: 0 2px;
    border: 1.5px dashed var(--ink-faint); border-radius: 6px;
    font-family: var(--font-mono); font-size: 0.92em; color: var(--ink-dim);
    cursor: pointer; background: var(--surface-2);
  }
  .blank:hover { border-color: var(--highlight); color: var(--ink); }
  .blank.revealed { border-style: solid; border-color: var(--highlight); background: var(--highlight-bg); color: var(--ink); cursor: default; }

  .reveal-btn {
    align-self: flex-start;
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    padding: 5px 12px; border-radius: 999px; cursor: pointer;
    background: var(--surface-2); border: 1px solid var(--line);
    color: var(--ink-dim);
  }
  .reveal-btn:hover { border-color: var(--highlight); color: var(--ink); }
  .reveal-btn:disabled { opacity: 0.5; cursor: default; }

  .proof-explain {
    background: var(--surface); border: 1px solid var(--line-soft); border-radius: 14px;
    padding: 16px 18px; font-size: 13.5px; color: var(--ink-dim);
  }
  .proof-explain h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin: 0 0 12px; }
  .explain-card { display: none; }
  .explain-card.is-active { display: block; }
  .explain-card .card-title { font-weight: 800; color: var(--ink); margin: 0 0 8px; font-size: 13.5px; }
  .explain-card .card-item { margin: 0 0 14px; padding-left: 12px; border-left: 2px solid var(--highlight); line-height: 1.75; }
  .explain-card .card-item p { margin: 0 0 6px; }
  .explain-card .card-item .k { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-faint); margin: 0 0 2px; }
  .explain-empty { color: var(--ink-faint); font-style: normal; }

  footer {
    margin-top: 48px; padding-top: 18px; border-top: 1px solid var(--line-soft);
    font-size: 12px; color: var(--ink-faint);
  }

  .loading, .not-found { color: var(--ink-faint); font-size: 14px; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back-link" href="../index.html">← 매트릭스로 돌아가기</a>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="흑백 테마 전환">
      <span class="dot-bw"></span>
      <span id="themeToggleLabel">라이트</span>
    </button>
  </div>

  <div id="content">
    <p class="loading">불러오는 중…</p>
  </div>

  <footer>수학 × AI 매트릭스 · 개념 증명 아카이브</footer>
</div>

<script src="./data.js"></script>
<script>
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById("themeToggle");
    var label = document.getElementById("themeToggleLabel");
    function current() {
      var attr = root.getAttribute("data-theme");
      if (attr === "dark" || attr === "light") return attr;
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    function render() { label.textContent = current() === "dark" ? "다크" : "라이트"; }
    btn.addEventListener("click", function () {
      var next = current() === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      render();
    });
    render();
  })();

  var DOMAIN_LABEL = {
    linalg: "선형대수", calc: "미적분 · 최적화", prob: "확률 · 통계",
    info: "정보이론", disc: "이산수학 · 그래프", numeric: "수치해석 · 기하"
  };

  function qs(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderBlank(sectionId, blank) {
    return '<span class="blank" data-section="' + sectionId + '" data-blank="' + blank.id + '" tabindex="0" role="button">[' + blank.id + ']</span>';
  }

  function renderSectionText(section) {
    var html = section.text;
    (section.blanks || []).forEach(function (b) {
      html = html.split("[[blank:" + b.id + "]]").join(renderBlank(section.id, b));
    });
    return html;
  }

  function buildExplainCard(section) {
    if (!section.blanks || !section.blanks.length) {
      return (
        '<div class="explain-card" data-section="' + section.id + '">' +
        '<p class="card-title">' + section.id + '</p>' +
        '<p class="card-item"><span class="k">해설</span><br>' + escapeHtml(section.note || "이 줄에는 빈칸이 없어요. 앞뒤 흐름을 잇는 문장입니다.") + '</p>' +
        '</div>'
      );
    }
    var items = section.blanks.map(function (b) {
      return (
        '<div class="card-item">' +
        '<p class="k">[' + b.id + ']</p>' +
        '<p>$' + b.latex + '$</p>' +
        '<p>' + escapeHtml(b.why) + '</p>' +
        '</div>'
      );
    }).join("");
    return '<div class="explain-card" data-section="' + section.id + '"><p class="card-title">' + section.id + ' 해설</p>' + items + '</div>';
  }

  function revealSection(concept, sectionId) {
    var row = document.querySelector('.proof-row[data-section="' + sectionId + '"]');
    if (row) {
      row.classList.add("is-revealed");
      row.querySelectorAll(".blank").forEach(function (span) {
        var bId = span.getAttribute("data-blank");
        var section = concept.sections.find(function (s) { return s.id === sectionId; });
        var blank = section.blanks.find(function (b) { return b.id === bId; });
        span.innerHTML = "$" + blank.latex + "$";
        span.classList.add("revealed");
      });
      var btn = row.querySelector(".reveal-btn");
      if (btn) btn.disabled = true;
    }
    document.querySelectorAll(".explain-card").forEach(function (c) { c.classList.remove("is-active"); });
    var card = document.querySelector('.explain-card[data-section="' + sectionId + '"]');
    var empty = document.getElementById("explainEmpty");
    if (card) {
      card.classList.add("is-active");
      if (empty) empty.style.display = "none";
      if (window.innerWidth >= 900) {
        card.scrollIntoView({ block: "nearest", behavior: "smooth" });
      } else {
        card.scrollIntoView({ block: "start", behavior: "smooth" });
      }
    }
    if (window.renderMathInElement) {
      window.renderMathInElement(document.getElementById("content"), {
        delimiters: [{ left: "$", right: "$", display: false }],
        throwOnError: false,
        errorColor: "#c0392b",
      });
    }
  }

  function renderConcept(concept) {
    var domainLabel = concept.domainLabel || DOMAIN_LABEL[concept.domain] || concept.domain;
    var parts = [];
    var currentPart = null;
    concept.sections.forEach(function (s) {
      if (s.newPart || !currentPart) {
        currentPart = { title: s.newPart || "증명", sections: [] };
        parts.push(currentPart);
      }
      currentPart.sections.push(s);
    });

    var explainCards = concept.sections.map(buildExplainCard).join("");

    var partsHtml = parts.map(function (part, i) {
      var rows = part.sections.map(function (s) {
        var hasBlanks = s.blanks && s.blanks.length;
        return (
          '<div class="proof-row" data-section="' + s.id + '">' +
          '<p class="proof-text">' + renderSectionText(s) + '</p>' +
          (hasBlanks
            ? '<button class="reveal-btn" data-section="' + s.id + '" type="button">정답 보기</button>'
            : '') +
          '</div>'
        );
      }).join("");
      return (
        (parts.length > 1 ? '<p class="part-heading">문항 ' + (i + 1) + ' · ' + escapeHtml(part.title) + '</p>' : '') +
        '<div class="proof-grid">' +
        '<div class="proof-left">' + rows + '</div>' +
        (i === 0
          ? '<aside class="proof-explain"><h3>정답 · 해설</h3><p class="explain-empty" id="explainEmpty">왼쪽에서 "정답 보기"를 누르면 여기에 해당 단계 해설이 나타나요.</p>' + explainCards + '</aside>'
          : '') +
        '</div>'
      );
    }).join("");

    var html =
      '<span class="domain-tag" style="color:var(--c-' + concept.domain + '); background:var(--c-' + concept.domain + '-bg)">' +
      '<span class="dot" style="background:var(--c-' + concept.domain + ')"></span>' + domainLabel +
      (concept.subLabel ? ' · ' + escapeHtml(concept.subLabel) : '') +
      '</span>' +
      '<h1>' + escapeHtml(concept.title) + '</h1>' +
      '<div class="explanation">' + concept.explanation + '</div>' +
      '<p class="proof-heading">빈칸 증명</p>' +
      partsHtml;

    document.getElementById("content").innerHTML = html;

    if (window.renderMathInElement) {
      window.renderMathInElement(document.getElementById("content"), {
        delimiters: [{ left: "$", right: "$", display: false }],
        throwOnError: false,
        errorColor: "#c0392b",
      });
    }

    document.querySelectorAll(".reveal-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        revealSection(concept, btn.getAttribute("data-section"));
      });
    });
    document.querySelectorAll(".blank").forEach(function (span) {
      span.addEventListener("click", function () {
        revealSection(concept, span.getAttribute("data-section"));
      });
    });
  }

  function boot() {
    var slug = qs("c");
    var concept = slug && window.CONCEPTS ? window.CONCEPTS[slug] : null;
    if (!concept) {
      document.getElementById("content").innerHTML =
        '<p class="not-found">개념을 찾을 수 없어요. <a href="../index.html">매트릭스로 돌아가서</a> 다시 눌러보세요.</p>';
      return;
    }
    document.title = concept.title + " · 개념 증명";
    renderConcept(concept);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
</script>
</body>
</html>
